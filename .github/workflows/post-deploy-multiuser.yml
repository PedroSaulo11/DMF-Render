name: Post-Deploy Multiuser Validation

on:
  workflow_dispatch:

jobs:
  validate-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Go-live checks
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TEST_COMPANY: ${{ secrets.TEST_COMPANY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_COMPANY_FORBIDDEN: ${{ secrets.TEST_COMPANY_FORBIDDEN }}
          LOAD_WORKERS: ${{ secrets.LOAD_WORKERS }}
          LOAD_ROUNDS: ${{ secrets.LOAD_ROUNDS }}
          LOAD_PAUSE_MS: ${{ secrets.LOAD_PAUSE_MS }}
          LOAD_MAX_P95_MS: ${{ secrets.LOAD_MAX_P95_MS }}
          LOAD_MAX_REQUEST_MS: ${{ secrets.LOAD_MAX_REQUEST_MS }}
          CHECK_TENANT_ISOLATION: "true"
          STRICT_SESSION_CHECK: "true"
          STRICT_ACCESS_CHECK: "true"
          STRICT_LOAD_CHECK: "true"
        run: npm run go-live:check
